<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="松鼠AI销售知识库 - 异议应对与邀约转化双模块知识库">
    <meta name="keywords" content="异议处理,销售技巧,邀约话术,松鼠AI,知识库">
    <meta property="og:title" content="🐿️ 松鼠AI 销售知识库">
    <meta property="og:description" content="异议应对 + 邀约转化双模块实战知识库">
    <title>🐿️ 松鼠AI 销售知识库 - 在线版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #FF6B6B;
            --primary-light: #FFE5E5;
            --primary-dark: #E63946;
            --secondary: #4D96FF;
            --secondary-light: #E8F1FF;
            --success: #51CF66;
            --warning: #FFD43B;
            --dark: #2C3E50;
            --light: #F8F9FA;
            --border: #E0E0E0;
            --muted: #6B7280;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: var(--dark);
        }

        .container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 24px;
            padding-top: 20px;
        }

        header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
        }

        header p {
            font-size: 1.05em;
            opacity: 0.92;
        }

        .module-switch {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin: 0 auto 24px;
            flex-wrap: wrap;
        }

        .module-btn {
            border: 1px solid rgba(255, 255, 255, 0.35);
            background: rgba(255, 255, 255, 0.14);
            color: white;
            padding: 12px 20px;
            border-radius: 999px;
            cursor: pointer;
            font-size: 0.98em;
            font-weight: 600;
            transition: all 0.3s ease;
            backdrop-filter: blur(6px);
        }

        .module-btn:hover,
        .module-btn.active {
            background: white;
            color: var(--primary-dark);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.12);
            transform: translateY(-1px);
        }

        .module-tip {
            text-align: center;
            color: rgba(255, 255, 255, 0.95);
            margin-bottom: 28px;
            font-size: 0.95em;
        }

        .main {
            display: grid;
            grid-template-columns: 340px 1fr;
            gap: 20px;
            margin-bottom: 40px;
        }

        @media (max-width: 900px) {
            .main {
                grid-template-columns: 1fr;
            }

            header h1 {
                font-size: 1.85em;
            }
        }

        .sidebar,
        .content {
            background: white;
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.14);
        }

        .sidebar {
            height: fit-content;
            position: sticky;
            top: 20px;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 24px;
        }

        .stat-card {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            padding: 16px 10px;
            border-radius: 12px;
            text-align: center;
        }

        .stat-number {
            font-size: 1.55em;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .stat-label {
            font-size: 0.85em;
            opacity: 0.92;
        }

        .search-box {
            margin-bottom: 10px;
        }

        .search-box input {
            width: 100%;
            padding: 13px 16px;
            border: 2px solid var(--border);
            border-radius: 10px;
            font-size: 0.98em;
            transition: all 0.3s;
        }

        .search-box input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px var(--primary-light);
        }

        .search-tip {
            color: var(--muted);
            font-size: 0.85em;
            margin-bottom: 20px;
            line-height: 1.5;
        }

        .categories {
            max-height: 480px;
            overflow-y: auto;
        }

        .category-item {
            padding: 12px 16px;
            margin-bottom: 8px;
            background: var(--light);
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.25s ease;
            border-left: 4px solid transparent;
            font-weight: 500;
        }

        .category-item:hover {
            background: var(--secondary-light);
            border-left-color: var(--secondary);
        }

        .category-item.active {
            background: var(--primary-light);
            border-left-color: var(--primary);
            color: var(--primary-dark);
        }

        .module-summary {
            margin-bottom: 22px;
            padding: 14px 16px;
            background: linear-gradient(135deg, #fff7ed 0%, #fff1f2 100%);
            border: 1px solid #fed7d7;
            border-radius: 12px;
            color: #7c2d12;
            line-height: 1.6;
            font-size: 0.94em;
        }

        .objection-list {
            display: grid;
            gap: 16px;
        }

        .knowledge-card {
            padding: 20px;
            border: 1px solid var(--border);
            border-radius: 14px;
            transition: all 0.3s ease;
            cursor: pointer;
            background: white;
        }

        .knowledge-card:hover {
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
            transform: translateY(-2px);
        }

        .knowledge-card.expanded {
            border-color: var(--primary);
            background: #fffdfd;
        }

        .knowledge-header {
            display: flex;
            align-items: flex-start;
            gap: 12px;
        }

        .knowledge-id {
            background: var(--primary);
            color: white;
            width: 38px;
            height: 38px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            flex-shrink: 0;
        }

        .knowledge-main {
            flex: 1;
            min-width: 0;
        }

        .knowledge-title {
            font-size: 1.08em;
            font-weight: 700;
            margin-bottom: 10px;
            line-height: 1.4;
        }

        .knowledge-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .chip {
            background: var(--secondary-light);
            color: var(--secondary);
            padding: 4px 10px;
            border-radius: 999px;
            font-size: 0.82em;
            font-weight: 600;
        }

        .chip.primary {
            background: var(--primary-light);
            color: var(--primary-dark);
        }

        .knowledge-content {
            display: none;
        }

        .knowledge-card.expanded .knowledge-content {
            display: block;
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid rgba(0, 0, 0, 0.08);
        }

        .content-section {
            margin-bottom: 16px;
        }

        .content-section-title {
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 8px;
            font-size: 0.95em;
        }

        .content-section-content {
            color: #4b5563;
            line-height: 1.7;
            white-space: pre-wrap;
        }

        .list-box {
            list-style: none;
            padding-left: 0;
        }

        .list-box li {
            padding: 8px 0 8px 24px;
            position: relative;
            line-height: 1.7;
            color: #4b5563;
        }

        .list-box li::before {
            content: "→";
            position: absolute;
            left: 0;
            color: var(--primary);
            font-weight: 700;
        }

        .tips-box {
            background: #f8fafc;
            border-radius: 10px;
            padding: 12px 14px;
        }

        .tips-box > div {
            padding: 6px 0;
            color: #4b5563;
            line-height: 1.65;
        }

        .copy-btn {
            background: var(--success);
            color: white;
            border: none;
            padding: 10px 16px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 0.92em;
            margin-top: 12px;
            transition: all 0.2s ease;
        }

        .copy-btn:hover {
            background: #40C057;
        }

        .copy-btn.copied {
            background: #2f9e44;
        }

        .empty-state {
            text-align: center;
            padding: 56px 16px;
            color: #94a3b8;
        }

        footer {
            text-align: center;
            color: white;
            padding: 20px;
            opacity: 0.86;
        }

        .categories::-webkit-scrollbar {
            width: 6px;
        }

        .categories::-webkit-scrollbar-thumb {
            background: var(--primary);
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🐿️ 松鼠AI 销售知识库</h1>
            <p>异议应对 + 邀约转化双模块，门店销售一站式实战资料库</p>
        </header>

        <div class="module-switch" id="moduleSwitch">
            <button class="module-btn active" data-module="objections">📚 异议查询库</button>
            <button class="module-btn" data-module="invitation">📞 邀约话术库</button>
        </div>

        <div class="module-tip" id="moduleTip">当前查看：异议处理、回复方案、案例与销售技巧</div>

        <div class="main">
            <aside class="sidebar">
                <div class="stats">
                    <div class="stat-card">
                        <div class="stat-number" id="totalCount">-</div>
                        <div class="stat-label">知识条目</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number" id="categoryCount">-</div>
                        <div class="stat-label">分类</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number" id="metaCount">-</div>
                        <div class="stat-label" id="metaLabel">话术段落</div>
                    </div>
                </div>

                <div class="search-box">
                    <input type="text" id="searchInput" placeholder="🔍 搜索异议关键词...">
                </div>
                <div class="search-tip" id="searchTip">支持按标题、分类、关键词、客户描述快速检索。</div>

                <div class="categories" id="categories"></div>
            </aside>

            <div class="content">
                <div class="module-summary" id="moduleSummary">
                    点击卡片可展开完整内容，复制按钮可直接带走实战话术。
                </div>
                <div class="objection-list" id="knowledgeList">
                    <div class="empty-state">
                        <h3>加载中...</h3>
                        <p>正在获取销售知识库</p>
                    </div>
                </div>
            </div>
        </div>

        <footer>
            <p>© 2026 松鼠AI 销售知识库 | 版本 3.0 | <span id="updateTime">-</span></p>
        </footer>
    </div>

    <script>
        const DATASETS = {
            objections: {
                label: '异议查询库',
                file: './objections_db.json',
                emptyTitle: '没有找到相关异议',
                emptyDesc: '试试换个关键词，或切换其他分类。',
                searchPlaceholder: '🔍 搜索异议关键词...',
                searchTip: '支持按标题、分类、关键词、客户描述快速检索。',
                moduleTip: '当前查看：异议处理、回复方案、案例与销售技巧',
                moduleSummary: '适合在接待、咨询、成交推进时快速查找客户异议及应对方案。',
                metaLabel: '回复方案'
            },
            invitation: {
                label: '邀约话术库',
                file: './invitation_cases.json',
                emptyTitle: '没有找到相关邀约话术',
                emptyDesc: '试试搜索年级、场景、补课、升学、家长顾虑等词。',
                searchPlaceholder: '🔍 搜索场景/年级/升学/补课...',
                searchTip: '支持按场景、客户画像、痛点、跟进话术与微信模板检索。',
                moduleTip: '当前查看：首电邀约、二次跟进、微信模板与高频应答',
                moduleSummary: '新增补充资料库：围绕首电邀约、二次跟进、微信留资和到店确认，沉淀实战电话录音优化结果。',
                metaLabel: '话术段落'
            }
        };

        let database = {
            objections: [],
            invitation: []
        };
        let activeDatasetKey = 'objections';
        let selectedCategory = 'all';
        let filteredItems = [];

        async function init() {
            await Promise.all([
                loadDataset('objections', getObjectionFallback()),
                loadDataset('invitation', [])
            ]);
            attachEventListeners();
            renderCurrentDataset();
            updateUpdateTime();
        }

        async function loadDataset(key, fallback) {
            try {
                const response = await fetch(DATASETS[key].file);
                if (!response.ok) throw new Error('load failed');
                database[key] = await response.json();
            } catch (error) {
                console.warn(`数据加载失败: ${key}`, error.message);
                database[key] = fallback;
            }
        }

        function getCurrentItems() {
            return database[activeDatasetKey] || [];
        }

        function renderCurrentDataset() {
            selectedCategory = 'all';
            document.getElementById('searchInput').placeholder = DATASETS[activeDatasetKey].searchPlaceholder;
            document.getElementById('searchTip').textContent = DATASETS[activeDatasetKey].searchTip;
            document.getElementById('moduleTip').textContent = DATASETS[activeDatasetKey].moduleTip;
            document.getElementById('moduleSummary').textContent = DATASETS[activeDatasetKey].moduleSummary;
            document.getElementById('metaLabel').textContent = DATASETS[activeDatasetKey].metaLabel;
            renderCategories();
            updateStats();
            filterAndRender();
        }

        function updateStats() {
            const items = getCurrentItems();
            const totalCount = items.length;
            const categories = [...new Set(items.map(item => item.category))].length;
            const metaCount = items.reduce((sum, item) => sum + getMetaCount(item), 0);

            document.getElementById('totalCount').textContent = totalCount;
            document.getElementById('categoryCount').textContent = categories;
            document.getElementById('metaCount').textContent = metaCount;
        }

        function getMetaCount(item) {
            if (activeDatasetKey === 'objections') {
                return (item.solutions || []).length;
            }
            return (item.talkTrack || []).length + (item.followUp || []).length + (item.wechatTemplate || []).length + (item.faq || []).length;
        }

        function getCategoryEmoji(category) {
            const emojiMap = {
                '硬件相关': '🔧',
                '系统相关': '💻',
                '价格相关': '💰',
                '时间相关': '⏰',
                '时间问题': '⏰',
                '效果相关': '🎯',
                '效果的问题': '🎯',
                '回家商量': '🏠',
                '小学邀约': '🏫',
                '培优邀约': '🌟',
                '小升初规划': '🎓',
                '初三升学': '📈',
                '到店确认': '📍',
                '单科检测': '🧠'
            };
            return emojiMap[category] || '📌';
        }

        function renderCategories() {
            const categoriesContainer = document.getElementById('categories');
            const items = getCurrentItems();
            const categories = [...new Set(items.map(item => item.category))];

            categoriesContainer.innerHTML = `
                <div class="category-item active" data-category="all">📋 全部 (${items.length})</div>
                ${categories.map(cat => {
                    const count = items.filter(item => item.category === cat).length;
                    return `<div class="category-item" data-category="${cat}">${getCategoryEmoji(cat)} ${cat} (${count})</div>`;
                }).join('')}
            `;
        }

        function filterAndRender() {
            const searchTerm = document.getElementById('searchInput').value.trim().toLowerCase();
            const items = getCurrentItems();

            filteredItems = items.filter(item => {
                const matchCategory = selectedCategory === 'all' || item.category === selectedCategory;
                const matchSearch = !searchTerm || collectSearchText(item).includes(searchTerm);
                return matchCategory && matchSearch;
            });

            renderKnowledgeList();
        }

        function collectSearchText(item) {
            const parts = [
                item.title,
                item.category,
                item.stage,
                item.target,
                item.scene,
                item.description,
                item.analysis,
                ...(item.keywords || []),
                ...(item.solutions || []),
                ...(item.dataPoints || []),
                ...(item.counterExamples || []),
                ...(item.tips || []),
                ...(item.strengths || []),
                ...(item.risks || []),
                ...(item.talkTrack || []),
                ...(item.followUp || []),
                ...(item.wechatTemplate || []),
                ...(item.faq || [])
            ].filter(Boolean);

            return parts.join(' ').toLowerCase();
        }

        function renderKnowledgeList() {
            const container = document.getElementById('knowledgeList');

            if (filteredItems.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <h3>${DATASETS[activeDatasetKey].emptyTitle}</h3>
                        <p>${DATASETS[activeDatasetKey].emptyDesc}</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = filteredItems.map(item => activeDatasetKey === 'objections' ? renderObjectionCard(item) : renderInvitationCard(item)).join('');
        }

        function renderObjectionCard(item) {
            return `
                <div class="knowledge-card" data-id="${item.id}">
                    <div class="knowledge-header">
                        <div class="knowledge-id">${item.id}</div>
                        <div class="knowledge-main">
                            <div class="knowledge-title">${item.title}</div>
                            <div class="knowledge-tags">
                                <span class="chip primary">${item.category}</span>
                                ${(item.keywords || []).filter(Boolean).slice(0, 3).map(keyword => `<span class="chip">${keyword}</span>`).join('')}
                            </div>
                        </div>
                    </div>

                    <div class="knowledge-content">
                        ${renderTextSection('❓ 客户异议', item.description)}
                        ${renderTextSection('💡 问题分析', item.analysis)}
                        ${renderListSection('🎯 回复方案', item.solutions)}
                        ${renderBoxSection('📊 数据支撑', item.dataPoints, '•')}
                        ${renderBoxSection('✅ 成功案例', item.counterExamples, '•')}
                        ${renderBoxSection('💬 销售技巧', item.tips, '✨')}
                        <button class="copy-btn" data-copy-id="${item.id}">📋 复制话术</button>
                    </div>
                </div>
            `;
        }

        function renderInvitationCard(item) {
            return `
                <div class="knowledge-card" data-id="${item.id}">
                    <div class="knowledge-header">
                        <div class="knowledge-id">${item.id}</div>
                        <div class="knowledge-main">
                            <div class="knowledge-title">${item.title}</div>
                            <div class="knowledge-tags">
                                <span class="chip primary">${item.category}</span>
                                ${item.stage ? `<span class="chip">${item.stage}</span>` : ''}
                                ${(item.keywords || []).slice(0, 2).map(keyword => `<span class="chip">${keyword}</span>`).join('')}
                            </div>
                        </div>
                    </div>

                    <div class="knowledge-content">
                        ${renderTextSection('🎯 适用对象', item.target)}
                        ${renderTextSection('🧩 适用场景', item.scene)}
                        ${renderTextSection('📝 使用说明', item.description)}
                        ${renderBoxSection('✅ 亮点', item.strengths, '•')}
                        ${renderBoxSection('⚠️ 需注意的点', item.risks, '•')}
                        ${renderListSection('📞 首电参考话术', item.talkTrack)}
                        ${renderListSection('🔁 再次跟进', item.followUp)}
                        ${renderListSection('💬 微信跟进模板', item.wechatTemplate)}
                        ${renderListSection('❔ 高频问题应答', item.faq)}
                        <button class="copy-btn" data-copy-id="${item.id}">📋 复制话术</button>
                    </div>
                </div>
            `;
        }

        function renderTextSection(title, content) {
            if (!content) return '';
            return `
                <div class="content-section">
                    <div class="content-section-title">${title}</div>
                    <div class="content-section-content">${content}</div>
                </div>
            `;
        }

        function renderListSection(title, items) {
            if (!items || !items.length) return '';
            return `
                <div class="content-section">
                    <div class="content-section-title">${title}</div>
                    <ul class="list-box">
                        ${items.map(item => `<li>${item}</li>`).join('')}
                    </ul>
                </div>
            `;
        }

        function renderBoxSection(title, items, marker) {
            if (!items || !items.length) return '';
            return `
                <div class="content-section">
                    <div class="content-section-title">${title}</div>
                    <div class="tips-box">
                        ${items.map(item => `<div>${marker} ${item}</div>`).join('')}
                    </div>
                </div>
            `;
        }

        function buildCopyText(item) {
            if (activeDatasetKey === 'objections') {
                return `【${item.title}】\n\n问题：${item.description || ''}\n\n分析：${item.analysis || '无'}\n\n回复方案：\n${(item.solutions || []).join('\n')}`;
            }

            const sections = [
                `【${item.title}】`,
                item.target ? `适用对象：${item.target}` : '',
                item.scene ? `适用场景：${item.scene}` : '',
                item.description ? `使用说明：${item.description}` : '',
                item.talkTrack && item.talkTrack.length ? `\n首电话术：\n${item.talkTrack.join('\n')}` : '',
                item.followUp && item.followUp.length ? `\n再次跟进：\n${item.followUp.join('\n')}` : '',
                item.wechatTemplate && item.wechatTemplate.length ? `\n微信模板：\n${item.wechatTemplate.join('\n')}` : '',
                item.faq && item.faq.length ? `\n高频应答：\n${item.faq.join('\n')}` : ''
            ].filter(Boolean);

            return sections.join('\n\n');
        }

        function copyToClipboard(itemId, button) {
            const item = getCurrentItems().find(entry => String(entry.id) === String(itemId));
            if (!item) return;

            navigator.clipboard.writeText(buildCopyText(item)).then(() => {
                const original = button.textContent;
                button.textContent = '✅ 已复制';
                button.classList.add('copied');
                setTimeout(() => {
                    button.textContent = original;
                    button.classList.remove('copied');
                }, 1800);
            }).catch(() => {
                alert('复制失败，请手动复制');
            });
        }

        function attachEventListeners() {
            document.getElementById('searchInput').addEventListener('input', filterAndRender);

            document.getElementById('moduleSwitch').addEventListener('click', event => {
                const button = event.target.closest('.module-btn');
                if (!button) return;
                document.querySelectorAll('.module-btn').forEach(btn => btn.classList.remove('active'));
                button.classList.add('active');
                activeDatasetKey = button.dataset.module;
                document.getElementById('searchInput').value = '';
                renderCurrentDataset();
            });

            document.getElementById('categories').addEventListener('click', event => {
                const item = event.target.closest('.category-item');
                if (!item) return;
                document.querySelectorAll('.category-item').forEach(node => node.classList.remove('active'));
                item.classList.add('active');
                selectedCategory = item.dataset.category;
                filterAndRender();
            });

            document.getElementById('knowledgeList').addEventListener('click', event => {
                const copyButton = event.target.closest('.copy-btn');
                if (copyButton) {
                    event.stopPropagation();
                    copyToClipboard(copyButton.dataset.copyId, copyButton);
                    return;
                }

                const card = event.target.closest('.knowledge-card');
                if (card) {
                    card.classList.toggle('expanded');
                }
            });
        }

        function updateUpdateTime() {
            const now = new Date();
            document.getElementById('updateTime').textContent = `更新于 ${now.toLocaleString('zh-CN')}`;
        }
